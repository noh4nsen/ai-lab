services:
  test-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-api
    environment:
      ENVIRONMENT: development
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped